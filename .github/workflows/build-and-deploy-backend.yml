name: CI - Backend

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_NOLOGO: 'true'
  AZURE_WEBAPP_NAME: ais-api
  AZURE_WEBAPP_PACKAGE_PATH: "./ais-server/AccountabilityInformationSystem/AccountabilityInformationSystem.Api/publish"
  WORKING_DIRECTORY: ais-server/AccountabilityInformationSystem
  SOLUTION_PATH: "AccountabilityInformationSystem.sln"
  API_PROJECT_PATH: "AccountabilityInformationSystem.Api"
  PUBLISH_DIR: "./publish"
  CONNECTIONSTRINGS__DATABASE: "<Replaced by Bundle>"

jobs:
    build-and-test:
        name: Build and Test
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ${{ env.WORKING_DIRECTORY }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                dotnet-version: ${{ env.DOTNET_VERSION }}
                cache: true
                cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/Directory.Packages.props

            - name: Restore
              run: dotnet restore ${{ env.SOLUTION_PATH }}

            - name: Build
              run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

            - name: Test
              run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-restore --no-build --verbosity normal
              env:
                Jwt__Key: ${{ secrets.JWT_KEY }}
                Encryption__Key: ${{ secrets.ENCRYPTION_KEY }}

            - name: Publish
              run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --no-restore --property:PublishDir=${{ env.PUBLISH_DIR }}

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                name: webapp
                path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
    
    apply-migrations:
        name: Apply Database Migrations
        needs: build-and-test
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

        defaults:
            run:
                working-directory: ${{ env.WORKING_DIRECTORY }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Install EF Core CLI
              run: dotnet tool install --global dotnet-ef

            - name: Create migration bundle
              run: |
                dotnet ef migrations bundle --startup-project ${{ env.API_PROJECT_PATH }} --project ${{ env.API_PROJECT_PATH }} --context ApplicationDbContext --configuration Release --output app-bundle
                dotnet ef migrations bundle --startup-project ${{ env.API_PROJECT_PATH }} --project ${{ env.API_PROJECT_PATH }} --context ApplicationIdentityDbContext --configuration Release --output identity-bundle

            - name: Apply app migrations
              run: ./app-bundle --connection "${{ secrets.DATABASE_CONNECTION_STRING }}"

            - name: Apply identity migrations
              run: ./identity-bundle --connection "${{ secrets.DATABASE_CONNECTION_STRING }}"
