name: CI - Full Stack

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_NOLOGO: 'true'
  AZURE_WEBAPP_NAME: ais-api
  AZURE_WEBAPP_PACKAGE_PATH: "./ais-server/AccountabilityInformationSystem/AccountabilityInformationSystem.Api/publish"
  WORKING_DIRECTORY: ais-server/AccountabilityInformationSystem
  SOLUTION_PATH: "AccountabilityInformationSystem.sln"
  API_PROJECT_PATH: "AccountabilityInformationSystem.Api"
  PUBLISH_DIR: "./publish"
  CONNECTIONSTRINGS__DATABASE: "<Replaced by Bundle>"

jobs:
    build-and-test:
        name: "Backend: Build and Test"
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ${{ env.WORKING_DIRECTORY }}

        steps:
            - uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                dotnet-version: ${{ env.DOTNET_VERSION }}
                cache: true
                cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/Directory.Packages.props

            - name: Restore
              run: dotnet restore ${{ env.SOLUTION_PATH }}

            - name: Build
              run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

            - name: Test
              run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-restore --no-build --verbosity normal
              env:
                Jwt__Key: ${{ secrets.JWT_KEY }}
                Encryption__Key: ${{ secrets.ENCRYPTION_KEY }}
                ConnectionStrings__AccountabilityInformationSystemDb: ${{ secrets.DATABASE_CONNECTION_STRING }}

            - name: Publish
              run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --no-restore --property:PublishDir=${{ env.PUBLISH_DIR }}

            - name: Upload Artifacts
              uses: actions/upload-artifact@v7
              with:
                name: webapp
                path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
    
    apply-migrations:
        name: "Database: Apply Migrations"
        needs: build-and-test
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

        defaults:
            run:
                working-directory: ${{ env.WORKING_DIRECTORY }}

        steps:
            - uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore
              run: dotnet restore ${{ env.SOLUTION_PATH }}

            - name: Install EF Core CLI
              run: dotnet tool install --global dotnet-ef

            - name: Create migration bundle
              run: |
                dotnet ef migrations bundle --startup-project ${{ env.API_PROJECT_PATH }} --project ${{ env.API_PROJECT_PATH }} --context ApplicationDbContext --configuration Release --output app-bundle
                dotnet ef migrations bundle --startup-project ${{ env.API_PROJECT_PATH }} --project ${{ env.API_PROJECT_PATH }} --context ApplicationIdentityDbContext --configuration Release --output identity-bundle

            - name: Apply app migrations
              run: ./app-bundle --connection "${{ secrets.DATABASE_CONNECTION_STRING }}"
              env:
                Jwt__Key: ${{ secrets.JWT_KEY }}
                Encryption__Key: ${{ secrets.ENCRYPTION_KEY }}
                ConnectionStrings__AccountabilityInformationSystemDb: ${{ secrets.DATABASE_CONNECTION_STRING }}

            - name: Apply identity migrations
              run: ./identity-bundle --connection "${{ secrets.DATABASE_CONNECTION_STRING }}"
              env:
                Jwt__Key: ${{ secrets.JWT_KEY }}
                Encryption__Key: ${{ secrets.ENCRYPTION_KEY }}
                ConnectionStrings__AccountabilityInformationSystemDb: ${{ secrets.DATABASE_CONNECTION_STRING }}

    deploy:
        name: "Backend: Deploy to Azure"
        runs-on: ubuntu-latest
        needs: apply-migrations
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

        steps:
            - name: Download artifact from build job
              uses: actions/download-artifact@v8
              with:
                name: webapp
                path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

            - name: Deploy
              uses: azure/webapps-deploy@v3
              with:
                app-name: ${{ env.AZURE_WEBAPP_NAME }}
                publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
                package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

    build-and-deploy-client:
        name: "Frontend: Build and Deploy"
        runs-on: ubuntu-latest
        needs: deploy
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

        defaults:
            run:
                working-directory: ./ais-client

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                submodules: true
                lfs: true

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                node-version: '22'
                cache: 'npm'
                cache-dependency-path: ./ais-client/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Install SWA CLI
              run: npm install -g @azure/static-web-apps-cli

            - name: Deploy to Azure Static Web Apps
              env:
                AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
              run: swa deploy --env production --deployment-token $AZURE_STATIC_WEB_APPS_API_TOKEN --output-location dist/ais-client/browser
