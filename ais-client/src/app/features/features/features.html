<main>
  <section id="features">
    <h2>Features</h2>
    @if (ikunks.isLoading()) {
      <p>Loading...</p>
    } @else if (ikunks.error()) {
      <p>Failed to load features.</p>
    } @else {
      @if (ikunks.value()!.length > 0) {
        <ul>
          @for (ikunk of ikunks.value(); track ikunk.id) {
            <li>{{ ikunk.name }} — {{ ikunk.fullName }}</li>
          }
        </ul>
      } @else {
        <p>No features available.</p>
      }
    }
  </section>
</main>
