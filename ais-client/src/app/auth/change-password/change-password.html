<div class="app-auth-page">
  <div class="app-auth-card max-w-md">
    <h1 class="app-header-1">Change Password</h1>
    <h3 class="app-header-3">Use this form to change your password</h3>
    @if (httpErrorService.errorDetail()) {
      <div class="error-summary">{{ httpErrorService.errorDetail() }}</div>
    }
    <form class="app-form" [formRoot]="changePasswordForm" >
        <label class="app-form-label">
            Current Password:
            <input type="password" class="app-form-input" 
                [formField]="changePasswordForm.oldPassword"
                [aria-invalid]="ariaInvalidState(changePasswordForm.oldPassword)"
                autocomplete="current-password" />
            <app-form-error [fieldRef]="changePasswordForm.oldPassword" />
        </label>
        <label class="app-form-label">
            New Password:
            <input type="password" class="app-form-input" 
                [formField]="changePasswordForm.newPassword" 
                [aria-invalid]="ariaInvalidState(changePasswordForm.newPassword)"
                autocomplete="new-password" />
            <app-form-error [fieldRef]="changePasswordForm.newPassword" />
        </label>
        <label class="app-form-label">
            Confirm New Password:
            <input type="password" class="app-form-input" 
                [formField]="changePasswordForm.confirmPassword" 
                [aria-invalid]="ariaInvalidState(changePasswordForm.confirmPassword)"
                autocomplete="new-password" />
            <app-form-error [fieldRef]="changePasswordForm.confirmPassword" />
        </label>
        <label class="app-form-label">
            Code (If required):
            <input type="text" class="app-form-input" [formField]="changePasswordForm.code" />
        </label>
         <button type="submit" class="app-primary-button"
            [disabled]="changePasswordForm().submitting()"
            [aria-busy]="changePasswordForm().submitting()">
            @if (changePasswordForm().submitting()) { Changing... } @else { Change }
        </button>
    </form>
  </div>
</div>
