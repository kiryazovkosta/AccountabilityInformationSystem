@if (user(); as u) {
  <div class="app-auth-page">
    <div class="app-auth-card max-w-md flex flex-col items-center gap-6">

      <div class="flex flex-col items-center gap-2">
        @if (u.image) {
          <img alt="u.fullName" class="w-24 h-24 rounded-full object-cover" [src]="u.image" [alt]="u.fullName" />
        } @else {
          <div class="w-24 h-24 rounded-full bg-brand flex items-center justify-center text-white text-3xl font-bold">
            {{ initials() }}
          </div>
        }
        <h1 class="app-header-1 mb-0">{{ u.fullName }}</h1>
        <span class="text-ink/60 text-sm">@{{ u.username }}</span>
      </div>

      <div class="w-full flex flex-col divide-y divide-rose-muted">
        <div class="flex justify-between py-3">
          <span class="text-sm font-medium text-ink/60">Email</span>
          <span class="text-sm font-medium text-ink">{{ u.email }}</span>
        </div>
        <div class="flex justify-between py-3">
          <span class="text-sm font-medium text-ink/60">Member Since</span>
          <span class="text-sm font-medium text-ink">{{ u.createdAt | date:'mediumDate' }}</span>
        </div>
        @if (u.modifiedAt) {
          <div class="flex justify-between py-3">
            <span class="text-sm font-medium text-ink/60">Last Updated</span>
            <span class="text-sm font-medium text-ink">{{ u.modifiedAt | date:'mediumDate' }}</span>
          </div>
        }
      </div>

    </div>
  </div>
}
