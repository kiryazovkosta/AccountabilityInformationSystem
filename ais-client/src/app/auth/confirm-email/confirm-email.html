<h2>Confirm your account</h2>

@if (confirmResource.isLoading()) {
    <p>Verifying your email and confirm your account...</p>
} @else if (confirmResource.value()) {
    <div class="success">{{ confirmResource.value() }}</div>
} @else if (confirmResource.error()) {
    <div class="error">Verification failed. The link may be expired.</div>
}
