<header>
    <img src="logo.png" alt="Logo">
    <nav class="nav-menu" [class.active]="isMenuOpen()">
        <ul class="main-nav">
            <li><a routerLink="/home" routerLinkActive="active" (click)="closeMenu()">Home</a></li>
            <li><a routerLink="/ikunks" routerLinkActive="active" (click)="closeMenu()">Ikunks</a></li>
            <li><a routerLink="/pricing" routerLinkActive="active" (click)="closeMenu()">Pricing</a></li>
            <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
        </ul>
        <ul class="user-nav">
            <li>
                @if (isLoggedIn()) {
                    <div class="has-submenu" [class.show-submenu]="isSubmenuOpen()">
                        <a class="profile-btn" (click)="toggleSubmenu($event)">{{ userName() || 'User' }}</a>
                        <div class="submenu-panel">
                            <div class="panel-header">
                                <span class="panel-title"></span>
                                <button type="button" class="close-btn" (click)="closeSubmenu($event)" aria-label="Close menu">
                                    <span>&times;</span>
                                </button>
                            </div>
                            <div class="panel-body">
                                <ul class="submenu">
                                    <li><a routerLink="/auth/user-profile" routerLinkActive="active" (click)="closeMenu()">Profile</a></li>
                                    <li><a routerLink="/auth/change-password" routerLinkActive="active" (click)="closeMenu()">Change Password</a></li>
                                    <li><a routerLink="/auth/logout" class="logout-btn" (click)="closeMenu()">Logout</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>

                } @else {
                    <a routerLink="/auth/login" routerLinkActive="active" class="login-btn" (click)="closeMenu()">Login</a>
                    <a routerLink="/auth/register" routerLinkActive="active" class="register-btn" (click)="closeMenu()">Register</a>
                }
            </li>
        </ul>
    </nav>
    <button type="button" class="hamburger" aria-label="Toggle navigation" (click)="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>
</header>
